[project]
name = "master-thesis-3d-vla"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    # Core ML
    "torch>=2.7",
    "torchvision>=0.22",
    "numpy>=1.26",
    "Pillow",
    "huggingface_hub",
    "einops",
    "safetensors",
    # Habitat (built from source via [tool.uv.sources])
    "habitat-sim",
    # Experiment tracking
    "wandb",
    # Data
    "h5py",
    "tqdm",
    # ALFRED / AI2-THOR
    "ai2thor>=5.0.0",
    # Notebook / viz
    "ipykernel",
    "matplotlib",
    "plotly>=6.5.2",
    "nbformat>=5.10.4",
    # Dev
    "pytest",
]

[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

# ---------- uv configuration ----------

[tool.uv]
python-preference = "only-managed"

# habitat-sim cmake build needs deps available in the project env
no-build-isolation-package = ["habitat-sim"]

[tool.uv.sources]
habitat-sim = { git = "https://github.com/facebookresearch/habitat-sim", branch = "stable", subdirectory = "." }
