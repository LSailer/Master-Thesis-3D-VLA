[project]
name = "master-thesis-3d-vla"
version = "0.1.0"
requires-python = ">=3.10"
dependencies = [
    # VGGT deps
    "torch>=2.7",
    "torchvision>=0.22",
    "numpy>=1.26",
    "Pillow",
    "huggingface_hub",
    "einops",
    "safetensors",
    # Habitat
    "habitat-sim @ git+https://github.com/facebookresearch/habitat-sim.git",
    "habitat-lab @ git+https://github.com/facebookresearch/habitat-lab.git#subdirectory=habitat-lab",
    # notebook
    "ipykernel",
    "matplotlib",
    "manim>=0.18.1",
    "plotly>=6.5.2",
    "nbformat>=5.10.4",
    # ALFRED / AI2-THOR
    "ai2thor>=5.0.0",
    # data
    "h5py",
    "tqdm",
    # tracking
    "wandb",
    # dev
    "pytest",
]

[project.optional-dependencies]
metal = ["jax>=0.4.35", "jax-metal", "equinox>=0.11", "optax"]
cuda = ["jax[cuda12]>=0.4.35", "equinox>=0.11", "optax"]

[tool.uv]
python-preference = "only-managed"
