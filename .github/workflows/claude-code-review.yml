name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  claude-review:
    if: |
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          model: sonnet
          prompt: |
            Review this PR and apply fixes directly. Focus on:
            1. Correctness — bugs, logic errors, edge cases
            2. Simplification — remove dead code, deduplicate, reduce complexity
            3. JAX/Equinox patterns — immutability, jit compatibility, PRNG key handling
            4. Test coverage — are acceptance criteria tested?
            5. Security — no secrets, no injection risks

            If you find issues, fix them directly by editing the code and committing.
            Be concise. Only flag real issues, not style nits.
            If tests exist, verify they actually test the claimed behavior.
          max_turns: 30
          show_full_output: true
