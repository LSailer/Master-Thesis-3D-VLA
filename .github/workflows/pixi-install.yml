name: Pixi Install

on:
  push:
    branches: ["dev/pixi"]

jobs:
  install-pixi:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install pixi
        run: |
          if ! command -v pixi &> /dev/null; then
            curl -fsSL https://pixi.sh/install.sh | sh
            echo "$HOME/.pixi/bin" >> $GITHUB_PATH
          fi

      - name: Verify pixi installation
        run: pixi --version
