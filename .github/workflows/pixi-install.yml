name: Pixi Install

on:
  push:
    branches: ["dev/pixi", "claude/**"]

jobs:
  install-pixi:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1

      - name: Verify pixi installation
        run: pixi --version

      - name: Create issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "CI: Pixi Install failed on ${{ github.ref_name }}" \
            --body "@claude Workflow **Pixi Install** failed on branch \`${{ github.ref_name }}\` (commit \`${{ github.sha }}\`). Please investigate and fix.

          [View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})"
