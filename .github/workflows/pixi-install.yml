name: Pixi Install

on:
  push:
    branches: ["dev/pixi", "claude/**"]

jobs:
  install-pixi:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          environments: ci
          locked: false   # no pixi.lock checked in yet

      - name: Verify pixi installation
        run: pixi --version
