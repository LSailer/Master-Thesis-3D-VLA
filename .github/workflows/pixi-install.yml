name: Pixi Install

on:
  push:
    branches: ["dev/pixi"]

jobs:
  install-pixi:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1

      - name: Verify pixi installation
        run: pixi --version
