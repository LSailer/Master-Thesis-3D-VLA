[workspace]
name = "habitat-env"
channels = ["aihabitat-nightly", "conda-forge"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.10"
habitat-sim = { version = ">=0.3.3", build = "*bullet*" }
pip = "*"
numpy = ">=1.26"
cmake = ">=3.27"
ipykernel = "*"
matplotlib = "*"

[pypi-dependencies]
# Core ML
torch = ">=2.7"
torchvision = ">=0.22"
einops = "*"
safetensors = "*"
huggingface_hub = "*"
pillow = "*"
tqdm = "*"
# Experiment tracking
wandb = "*"
# Data
h5py = "*"
# Visualization
plotly = ">=6.5"
manim = ">=0.18.1"
# Dev
pytest = "*"
# This project (editable install)
master-thesis-3d-vla = { path = ".", editable = true }

# --- CUDA (cluster) ---
[feature.cuda]
platforms = ["linux-64"]
channels = ["nvidia", "conda-forge"]

[feature.cuda.dependencies]
cuda-toolkit = "12.*"

[feature.cuda.pypi-dependencies]
jax = { version = ">=0.4.35", extras = ["cuda12"] }
equinox = ">=0.11"
optax = "*"

# --- Metal (macOS) ---
[feature.metal]
platforms = ["osx-arm64"]

[feature.metal.pypi-dependencies]
jax = ">=0.4.35"
jax-metal = "*"
equinox = ">=0.11"
optax = "*"

# --- Dev tasks ---
[feature.dev]

[feature.dev.tasks]
smoke = "python scripts/smoke_test.py"
test = "pytest tests/ -x -q"

# --- Environments ---
[environments]
default = { features = ["metal"], solve-group = "default" }
cluster = { features = ["cuda"], solve-group = "cluster" }
dev = { features = ["cuda", "dev"], solve-group = "cluster" }
